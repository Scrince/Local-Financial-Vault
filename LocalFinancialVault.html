<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Local Financial Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #111;
    --bg-alt: #181818;
    --fg: #eee;
    --accent: #3fa9f5;
    --danger: #e74c3c;
    --border: #333;
    --muted: #888;
    --input-bg: #222;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
  }
  header {
    padding: 0.75rem 1rem;
    background: #000;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  header h1 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  #btnSettings {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.25rem 0.5rem;
    border-radius: 3px;
    font-size: 0.75rem;
    cursor: pointer;
  }
  header .summary {
    display: flex;
    gap: 1.5rem;
    font-size: 0.9rem;
  }
  header .summary span label {
    color: var(--muted);
    margin-right: 0.25rem;
  }
  main {
    display: flex;
    height: calc(100vh - 52px);
  }
  .sidebar {
    width: 220px;
    border-right: 1px solid var(--border);
    background: var(--bg-alt);
    padding: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar section {
    border: 1px solid var(--border);
    padding: 0.5rem;
    border-radius: 4px;
  }
  .sidebar h2 {
    font-size: 0.85rem;
    margin: 0 0 0.5rem 0;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .sidebar button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.35rem 0.5rem;
    border-radius: 3px;
    font-size: 0.8rem;
    cursor: pointer;
    width: 100%;
    margin-bottom: 0.3rem;
    text-align: left;
  }
  .sidebar button.danger { background: var(--danger); }
  .sidebar input[type="file"]::file-selector-button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.35rem 0.5rem;
    border-radius: 3px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .sidebar input[type="file"] {
    width: 100%;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .top-bar {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .top-bar input[type="text"] {
    flex: 1;
    padding: 0.35rem;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--fg);
    font-size: 0.85rem;
  }
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: #050505;
    flex-wrap: wrap;
  }
  .tab {
    padding: 0.5rem 0.75rem;
    cursor: pointer;
    font-size: 0.85rem;
    border-right: 1px solid var(--border);
    color: var(--muted);
    user-select: none;
    white-space: nowrap;
  }
  .tab.active {
    background: var(--bg-alt);
    color: var(--fg);
    font-weight: 600;
  }
  .tab-content {
    flex: 1;
    overflow: auto;
    padding: 0.75rem;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 0.35rem 0.4rem;
    text-align: left;
    white-space: nowrap;
  }
  th {
    background: #151515;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  tr:nth-child(even) { background: #141414; }
  tr:nth-child(odd)  { background: #101010; }
  .actions button {
    font-size: 0.7rem;
    padding: 0.2rem 0.35rem;
    margin-right: 0.15rem;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    color: #fff;
  }
  .actions button.edit-btn { background: var(--accent); }
  .actions button.dup-btn  { background: #7c5cbf; }
  .actions button.del-btn  { background: var(--danger); }
  .controls {
    margin-bottom: 0.5rem;
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.3rem 0.5rem;
    border-radius: 3px;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .status {
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* Modals */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal {
    background: var(--bg-alt);
    border: 1px solid var(--border);
    padding: 0.75rem;
    border-radius: 4px;
    width: 460px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 { margin: 0 0 0.5rem 0; font-size: 0.95rem; }
  .modal label { font-size: 0.8rem; display: block; margin-top: 0.5rem; color: var(--muted); }
  .modal input[type="password"],
  .modal input[type="text"],
  .modal input[type="number"],
  .modal select,
  .modal textarea {
    width: 100%;
    padding: 0.35rem;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--fg);
    font-size: 0.85rem;
    font-family: inherit;
  }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-footer { margin-top: 0.75rem; text-align: right; }
  .modal-footer button { padding: 0.3rem 0.6rem; font-size: 0.8rem; border-radius: 3px; border: none; cursor: pointer; }
  .modal-footer button.primary   { background: var(--accent); color: #fff; }
  .modal-footer button.secondary { background: #333; color: #fff; margin-right: 0.25rem; }

  mark { background: #3fa9f540; color: var(--fg); border-radius: 2px; padding: 0 1px; }
  .empty-state { color: var(--muted); font-size: 0.85rem; padding: 1rem 0; }

  /* Charts */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .chart-box {
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem;
  }
  .chart-box.wide { grid-column: 1 / -1; }
  .chart-box h4 {
    margin: 0 0 0.5rem 0;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .chart-box canvas { display: block; width: 100% !important; }
  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.4rem;
    font-size: 0.71rem;
    color: var(--muted);
  }
  .chart-legend span { display: flex; align-items: center; gap: 0.25rem; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>

<!-- Modal: Open Vault -->

    <input type="password" id="openVaultPassword">

<script>
/* ============================================================

let vault         = null;
let vaultPassword = null;
let pendingOpenFile = null;
let currentTab    = "bankAccounts";
let currentEdit   = { category: null, index: null };
let autoLockTimer = null;
let searchQuery   = "";
const AUTO_LOCK_MS = 10 * 60 * 1000;

/* ============================================================

const SCHEMAS = {

  ],
  stocks: [
    { key: "ticker",         label: "Ticker",             type: "text"     },
    { key: "companyName",    label: "Company",            type: "text"     },
    { key: "shares",         label: "Shares",             type: "number"   },
    { key: "purchasePrice",  label: "Purchase Price ($)", type: "number"   },
    { key: "currentPrice",   label: "Current Price ($)",  type: "number"   },
    { key: "account",        label: "Brokerage",          type: "text"     },
    { key: "notes",          label: "Notes",              type: "textarea" }
  ],
  crypto: [
    { key: "coin",           label: "Coin / Token",       type: "text"     },
    { key: "symbol",         label: "Symbol",             type: "text"     },
    { key: "quantity",       label: "Quantity",           type: "number"   },
    { key: "purchasePrice",  label: "Purchase Price ($)", type: "number"   },
    { key: "currentPrice",   label: "Current Price ($)",  type: "number"   },
    { key: "wallet",         label: "Wallet / Exchange",  type: "text"     },
    { key: "notes",          label: "Notes",              type: "textarea" }
  ],
  otherAssets: [
    { key: "category",       label: "Category (vehicle, real estate…)", type: "text"     },
    { key: "description",    label: "Description",        type: "text"     },
    { key: "estimatedValue", label: "Est. Value ($)",     type: "number"   },
    { key: "notes",          label: "Notes",              type: "textarea" }
  ],
  debts: [
    { key: "debtType",      label: "Type (loan, mortgage…)", type: "text"     },
    { key: "lender",        label: "Lender",              type: "text"     },
    { key: "accountNumber", label: "Account #",           type: "text"     },
    { key: "balance",       label: "Balance ($)",         type: "number"   },
    { key: "interestRate",  label: "Interest Rate (%)",   type: "number"   },
    { key: "minPayment",    label: "Min Payment ($)",     type: "number"   },
    { key: "notes",         label: "Notes",               type: "textarea" }
  ]
};

const CATEGORY_LABELS = {
  bankAccounts:       "Bank Accounts",
  creditCards:        "Credit Cards",
  retirementAccounts: "Retirement Accounts",
  stocks:             "Stocks",
  crypto:             "Crypto",
  otherAssets:        "Other Assets",
  debts:              "Debts",
  snapshots:          "Snapshots"
};

/* ============================================================
   UTILITIES
   ============================================================ */
function setStatus(msg) { document.getElementById("statusText").textContent = msg; }

function resetAutoLockTimer() {
  if (autoLockTimer) clearTimeout(autoLockTimer);
  if (!vault) return;
  autoLockTimer = setTimeout(() => { lockVault(); alert("Session auto-locked due to inactivity."); }, AUTO_LOCK_MS);
}

function formatMoney(v) { return "$" + (Number(v) || 0).toFixed(2); }

function escapeHtml(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function highlightText(text, q) {
  if (!q) return escapeHtml(text);
  return escapeHtml(text).replace(
    new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + ")", "gi"),
    "<mark>$1</mark>"
  );
}

/* ============================================================
   VAULT INIT
   ============================================================ */
function initEmptyVault() {
  const now = new Date().toISOString();
  vault = {
    metadata: { version: "1.0", createdAt: now, lastModifiedAt: now },
    accounts: { bankAccounts:[], creditCards:[], retirementAccounts:[], stocks:[], crypto:[], otherAssets:[], debts:[] },
    snapshots: []
  };
}

/* ============================================================
   CRYPTO  (PBKDF2-SHA256 + AES-GCM) — FR-2, FR-3, SR-1, SR-2
   ============================================================ */
async function getKey(pwd, salt) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pwd), {name:"PBKDF2"}, false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:100000, hash:"SHA-256"}, km, {name:"AES-GCM",length:256}, false, ["encrypt","decrypt"]);
}
function joinBufs(...bs) {
  const out = new Uint8Array(bs.reduce((s,b)=>s+b.byteLength,0)); let off=0;
  bs.forEach(b=>{out.set(new Uint8Array(b),off);off+=b.byteLength;}); return out.buffer;
}
const b64e = b => btoa(String.fromCharCode(...new Uint8Array(b)));
const b64d = s => { const bin=atob(s),a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a.buffer; };

async function encryptVault(pwd) {
  const salt=crypto.getRandomValues(new Uint8Array(16)), iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await getKey(pwd,salt);
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(JSON.stringify(vault)));
  return b64e(joinBufs(salt.buffer,iv.buffer,ct));
}
async function decryptVault(pwd, b64) {
  const bytes=new Uint8Array(b64d(b64));
  const key=await getKey(pwd,bytes.slice(0,16));
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:bytes.slice(16,28)},key,bytes.slice(28));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ============================================================
   VAULT ACTIONS
   ============================================================ */
function lockVault() {
  vault=vaultPassword=pendingOpenFile=null;
  if(autoLockTimer)clearTimeout(autoLockTimer);
  searchQuery="";
  document.getElementById("searchBox").value="";
  document.getElementById("searchStatus").textContent="";
  updateSummary(); renderCurrentTab();
  setStatus("Locked. Create or open a vault.");
}

async function saveVaultToDisk() {
  if(!vault||!vaultPassword){alert("No vault loaded.");return;}
  try {
    vault.metadata.lastModifiedAt=new Date().toISOString();
    const b64=await encryptVault(vaultPassword);
    const url=URL.createObjectURL(new Blob([b64],{type:"text/plain"}));
    const a=Object.assign(document.createElement("a"),{href:url,download:"vault-"+new Date().toISOString().replace(/[:.]/g,"-")+".lfv"});
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    setStatus("Vault saved ✓");
  } catch(e){console.error(e);alert("Error saving vault: "+e.message);}
}

const showModal = id => { document.getElementById(id).style.display="flex"; };
const hideModal = id => { document.getElementById(id).style.display="none"; };

/* Create */
document.getElementById("btnCreateVault").onclick=()=>{
  document.getElementById("createVaultPassword").value="";
  document.getElementById("createVaultPassword2").value="";
  showModal("modalCreateVault");
};
document.getElementById("cancelCreateVault").onclick=()=>hideModal("modalCreateVault");
document.getElementById("confirmCreateVault").onclick=()=>{
  const p1=document.getElementById("createVaultPassword").value;
  const p2=document.getElementById("createVaultPassword2").value;
  if(p1.length<12){alert("Password must be at least 12 characters.");return;}
  if(p1!==p2){alert("Passwords do not match.");return;}
  vaultPassword=p1; initEmptyVault();
  updateSummary();renderCurrentTab();resetAutoLockTimer();
  setStatus("New vault created. Remember to save!"); hideModal("modalCreateVault");
};

/* Open */
document.getElementById("vaultFile").addEventListener("change",e=>{
  pendingOpenFile=e.target.files[0];
  if(pendingOpenFile){document.getElementById("openVaultPassword").value="";showModal("modalOpenVault");}
  e.target.value="";
});
document.getElementById("cancelOpenVault").onclick=()=>{pendingOpenFile=null;hideModal("modalOpenVault");};
document.getElementById("confirmOpenVault").onclick=async()=>{
  if(!pendingOpenFile)return;
  const pwd=document.getElementById("openVaultPassword").value;
  if(pwd.length<12){alert("Password must be at least 12 characters.");return;}
  try{
    vault=await decryptVault(pwd,(await pendingOpenFile.text()).trim());
    vaultPassword=pwd; resetAutoLockTimer(); setStatus("Vault opened ✓");
    updateSummary();renderCurrentTab();
  } catch{alert("Unable to decrypt file. Check password or file integrity.");}
  pendingOpenFile=null; hideModal("modalOpenVault");
};

/* Save / Lock */
document.getElementById("btnSaveVault").onclick=()=>{resetAutoLockTimer();saveVaultToDisk();};
document.getElementById("btnLock").onclick=()=>{if(confirm("Lock and clear vault from memory?"))lockVault();};

/* Settings / Change Password */
document.getElementById("btnSettings").onclick=()=>{
  if(!vault){alert("Open a vault first.");return;}
  resetAutoLockTimer();
  ["oldPassword","newPassword","newPassword2"].forEach(id=>document.getElementById(id).value="");
  showModal("modalChangePassword");
};
document.getElementById("cancelChangePassword").onclick=()=>hideModal("modalChangePassword");
document.getElementById("confirmChangePassword").onclick=async()=>{
  const op=document.getElementById("oldPassword").value;
  const np=document.getElementById("newPassword").value;
  const np2=document.getElementById("newPassword2").value;
  if(op!==vaultPassword){alert("Current password is incorrect.");return;}
  if(np.length<12){alert("New password must be at least 12 characters.");return;}
  if(np!==np2){alert("New passwords do not match.");return;}
  vaultPassword=np; await saveVaultToDisk();
  hideModal("modalChangePassword"); setStatus("Password changed and vault re-saved ✓");
};

/* ============================================================
   TOTALS
   ============================================================ */
function calcTotals(){
  let assets=0,debts=0;
  if(!vault)return{assets,debts};
  const a=vault.accounts;
  a.bankAccounts.forEach(x=>assets+=Number(x.balance)||0);
  a.retirementAccounts.forEach(x=>assets+=Number(x.currentBalance)||0);
  a.stocks.forEach(x=>assets+=(Number(x.shares)||0)*(Number(x.currentPrice)||0));
  a.crypto.forEach(x=>assets+=(Number(x.quantity)||0)*(Number(x.currentPrice)||0));
  a.otherAssets.forEach(x=>assets+=Number(x.estimatedValue)||0);
  a.debts.forEach(x=>debts+=Number(x.balance)||0);
  return{assets,debts};
}

function assetsByCategory(){
  if(!vault)return{};
  const a=vault.accounts;
  let bank=0,retire=0,stock=0,cry=0,other=0;
  a.bankAccounts.forEach(x=>bank+=Number(x.balance)||0);
  a.retirementAccounts.forEach(x=>retire+=Number(x.currentBalance)||0);
  a.stocks.forEach(x=>stock+=(Number(x.shares)||0)*(Number(x.currentPrice)||0));
  a.crypto.forEach(x=>cry+=(Number(x.quantity)||0)*(Number(x.currentPrice)||0));
  a.otherAssets.forEach(x=>other+=Number(x.estimatedValue)||0);
  return{"Bank":bank,"Retirement":retire,"Stocks":stock,"Crypto":cry,"Other Assets":other};
}

function updateSummary(){
  const{assets,debts}=calcTotals();
  document.getElementById("summaryAssets").textContent=formatMoney(assets);
  document.getElementById("summaryDebts").textContent=formatMoney(debts);
  document.getElementById("summaryNetWorth").textContent=formatMoney(assets-debts);
}

/* Snapshot record */
document.getElementById("btnRecordSnapshot").onclick=()=>{
  if(!vault){alert("Vault is locked.");return;}
  resetAutoLockTimer();
  const{assets,debts}=calcTotals();
  vault.snapshots.push({timestamp:new Date().toISOString(),totalAssets:assets,totalDebts:debts,netWorth:assets-debts});
  vault.metadata.lastModifiedAt=new Date().toISOString();
  updateSummary();
  if(currentTab==="snapshots")renderCurrentTab();
  setStatus("Snapshot recorded.");
};

/* ============================================================
   TABS / SEARCH
   ============================================================ */
document.getElementById("tabs").addEventListener("click",e=>{
  const tab=e.target.closest(".tab");
  if(!tab)return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  tab.classList.add("active"); currentTab=tab.dataset.tab; renderCurrentTab();
});

document.getElementById("searchBox").addEventListener("input",e=>{
  resetAutoLockTimer();
  searchQuery=e.target.value.trim().toLowerCase();
  document.getElementById("searchStatus").textContent=searchQuery?`Filtering: "${searchQuery}"`:"";
  renderCurrentTab();
});

/* ============================================================
   RENDER DISPATCH
   ============================================================ */
function renderCurrentTab(){
  const c=document.getElementById("tabContent");
  if(!vault){c.innerHTML='<p class="empty-state">🔒 Vault is locked. Create or open a vault to get started.</p>';return;}
  currentTab==="snapshots"?renderSnapshots(c):renderCategory(c,currentTab);
}

/* ============================================================
   RENDER CATEGORY TABLE
   ============================================================ */
function renderCategory(container,category){
  const schema=SCHEMAS[category];
  if(!schema){container.innerHTML="";return;}
  const allRows=vault.accounts[category]||[];
  const rows=searchQuery
    ?allRows.filter(row=>schema.some(f=>String(row[f.key]??"").toLowerCase().includes(searchQuery)))
    :allRows;
  const label=CATEGORY_LABELS[category];

  let html=`<div class="controls">
    <button onclick="openAddModal('${category}')">＋ Add</button>
    <span class="status">${rows.length} of ${allRows.length} record(s)</span>
  </div>`;

  if(rows.length===0){
    html+=`<p class="empty-state">${searchQuery?"No results match your search.":"No entries yet. Click ＋ Add to begin."}</p>`;
    container.innerHTML=html;return;
  }

  const visible=schema.filter(f=>f.key!=="notes");
  html+=`<table><thead><tr>`;
  visible.forEach(f=>{html+=`<th>${escapeHtml(f.label)}</th>`;});
  html+=`<th>Actions</th></tr></thead><tbody>`;

  rows.forEach(row=>{
    const ri=allRows.indexOf(row);
    html+=`<tr title="${escapeHtml(row.notes??"")}">`;
    visible.forEach(f=>{
      let val=row[f.key]??"";
      if(f.type==="number"&&val!==""){
        const n=Number(val);
        if(!isNaN(n))val=(f.key==="interestRate"||f.key==="apr")?n.toFixed(2)+"%":formatMoney(n);
      }
      html+=`<td>${highlightText(String(val),searchQuery)}</td>`;
    });
    html+=`<td class="actions">
      <button class="edit-btn" onclick="openEditModal('${category}',${ri})">Edit</button>
      <button class="dup-btn"  onclick="duplicateEntry('${category}',${ri})">Dup</button>
      <button class="del-btn"  onclick="deleteEntry('${category}',${ri})">Del</button>
    </td></tr>`;
  });
  html+=`</tbody></table>`;
  container.innerHTML=html;
}

/* ============================================================
   RENDER SNAPSHOTS  (charts + table)
   ============================================================ */
function renderSnapshots(container){
  const snaps=vault.snapshots||[];
  const filtered=searchQuery
    ?snaps.filter(s=>s.timestamp.toLowerCase().includes(searchQuery)||String(s.netWorth).includes(searchQuery))
    :snaps;
  const rev=[...filtered].reverse();

  let html=`<div class="charts-grid">
    <div class="chart-box wide">
      <h4>Net Worth Over Time</h4>
      <canvas id="chartNetWorth" height="180"></canvas>
    </div>
    <div class="chart-box">
      <h4>Assets vs Debts</h4>
      <canvas id="chartAssetsDebts" height="200"></canvas>
      <div class="chart-legend" id="legendAD"></div>
    </div>
    <div class="chart-box">
      <h4>Assets by Category</h4>
      <canvas id="chartByCategory" height="200"></canvas>
      <div class="chart-legend" id="legendCat"></div>
    </div>
  </div>

  <div class="controls"><span class="status">${filtered.length} snapshot(s)</span></div>`;

  if(rev.length===0){
    html+=`<p class="empty-state">${searchQuery?"No results.":"No snapshots yet. Use the sidebar button."}</p>`;
  } else {
    html+=`<table><thead><tr>
      <th>Timestamp</th><th>Total Assets</th><th>Total Debts</th><th>Net Worth</th><th>Actions</th>
    </tr></thead><tbody>`;
    rev.forEach(s=>{
      const ri=snaps.indexOf(s);
      html+=`<tr>
        <td>${highlightText(new Date(s.timestamp).toLocaleString(),searchQuery)}</td>
        <td>${formatMoney(s.totalAssets)}</td>
        <td>${formatMoney(s.totalDebts)}</td>
        <td>${formatMoney(s.netWorth)}</td>
        <td class="actions"><button class="del-btn" onclick="deleteSnapshot(${ri})">Del</button></td>
      </tr>`;
    });
    html+=`</tbody></table>`;
  }
  container.innerHTML=html;

  requestAnimationFrame(()=>{
    drawLineChart(snaps);
    drawBarChart();
    drawPieChart();
  });
}

/* ============================================================
   CHARTS — pure Canvas, no external libs (FR-22)
   ============================================================ */
const PALETTE=["#3fa9f5","#2ecc71","#e74c3c","#f39c12","#9b59b6","#1abc9c","#e67e22","#e91e63"];

function initCanvas(id,H){
  const el=document.getElementById(id);
  if(!el)return null;
  const ctx=el.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const W=el.parentElement.clientWidth||300;
  el.width=W*dpr; el.height=H*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  return{ctx,W,H};
}

/* Line chart — net worth over time */
function drawLineChart(snaps){
  const C=initCanvas("chartNetWorth",180);
  if(!C)return;
  const{ctx,W,H}=C;
  const PAD={t:20,r:20,b:38,l:72};
  const cw=W-PAD.l-PAD.r, ch=H-PAD.t-PAD.b;

  if(snaps.length===0){
    ctx.fillStyle="#555";ctx.font="12px system-ui";ctx.textAlign="left";
    ctx.fillText("Record snapshots to populate this chart.",PAD.l,H/2);return;
  }

  const vals=snaps.map(s=>s.netWorth);
  const times=snaps.map(s=>new Date(s.timestamp).getTime());
  const minV=Math.min(...vals),maxV=Math.max(...vals),rangeV=(maxV-minV)||1;
  const minT=Math.min(...times),maxT=Math.max(...times),rangeT=(maxT-minT)||1;
  const toX=t=>PAD.l+((t-minT)/rangeT)*cw;
  const toY=v=>PAD.t+(1-(v-minV)/rangeV)*ch;

  /* grid */
  ctx.strokeStyle="#252525";ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=PAD.t+(ch/4)*i;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    ctx.fillStyle="#555";ctx.font="10px system-ui";ctx.textAlign="right";
    ctx.fillText(formatMoney(maxV-(rangeV/4)*i),PAD.l-4,y+3);
  }

  /* gradient fill */
  const grad=ctx.createLinearGradient(0,PAD.t,0,PAD.t+ch);
  grad.addColorStop(0,"rgba(63,169,245,0.22)");
  grad.addColorStop(1,"rgba(63,169,245,0)");
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(toX(times[0]),PAD.t+ch);
  snaps.forEach(s=>ctx.lineTo(toX(new Date(s.timestamp).getTime()),toY(s.netWorth)));
  ctx.lineTo(toX(times[times.length-1]),PAD.t+ch);
  ctx.closePath();ctx.fill();

  /* line */
  ctx.strokeStyle="#3fa9f5";ctx.lineWidth=2;
  ctx.beginPath();
  snaps.forEach((s,i)=>{
    const x=toX(new Date(s.timestamp).getTime()),y=toY(s.netWorth);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });ctx.stroke();

  /* dots */
  snaps.forEach(s=>{
    const x=toX(new Date(s.timestamp).getTime()),y=toY(s.netWorth);
    ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);
    ctx.fillStyle="#3fa9f5";ctx.fill();
    ctx.strokeStyle="#111";ctx.lineWidth=1;ctx.stroke();
  });

  /* x labels */
  ctx.fillStyle="#555";ctx.font="10px system-ui";ctx.textAlign="center";
  const fmtD=t=>new Date(t).toLocaleDateString();
  ctx.fillText(fmtD(minT),toX(minT),H-PAD.b+14);
  if(snaps.length>1)ctx.fillText(fmtD(maxT),toX(maxT),H-PAD.b+14);
}

/* Bar chart — current assets vs debts */
function drawBarChart(){
  const C=initCanvas("chartAssetsDebts",200);
  if(!C)return;
  const{ctx,W,H}=C;
  const PAD={t:20,r:20,b:30,l:72};
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const{assets,debts}=calcTotals();
  const maxV=Math.max(assets,debts,1);
  const bars=[{label:"Assets",value:assets,color:"#2ecc71"},{label:"Debts",value:debts,color:"#e74c3c"}];
  const barW=Math.min(55,(cw/2)-10);

  /* grid */
  ctx.strokeStyle="#252525";ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=PAD.t+(ch/4)*i;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    ctx.fillStyle="#555";ctx.font="10px system-ui";ctx.textAlign="right";
    ctx.fillText(formatMoney(maxV*(1-i/4)),PAD.l-4,y+3);
  }

  bars.forEach((b,i)=>{
    const bh=(b.value/maxV)*ch;
    const x=PAD.l+(cw/2)*i+(cw/2-barW)/2;
    const y=PAD.t+ch-bh;
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.roundRect(x,y,barW,bh,3);ctx.fill();
    ctx.fillStyle="#aaa";ctx.font="10px system-ui";ctx.textAlign="center";
    ctx.fillText(b.label,x+barW/2,H-PAD.b+14);
  });

  const leg=document.getElementById("legendAD");
  if(leg)leg.innerHTML=bars.map(b=>`<span><span class="legend-swatch" style="background:${b.color}"></span>${b.label}: ${formatMoney(b.value)}</span>`).join("");
}

/* Pie chart — assets by category */
function drawPieChart(){
  const C=initCanvas("chartByCategory",200);
  if(!C)return;
  const{ctx,W,H}=C;
  ctx.clearRect(0,0,W,H);

  const cats=assetsByCategory();
  const entries=Object.entries(cats).filter(([,v])=>v>0);
  const total=entries.reduce((s,[,v])=>s+v,0);

  if(total===0){
    ctx.fillStyle="#555";ctx.font="12px system-ui";ctx.textAlign="center";
    ctx.fillText("No asset data yet.",W/2,H/2);
    return;
  }

  const cx=W/2,cy=H/2,r=Math.min(cx,cy)-12;
  let angle=-Math.PI/2;

  entries.forEach(([,v],i)=>{
    const slice=(v/total)*2*Math.PI;
    ctx.fillStyle=PALETTE[i%PALETTE.length];
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle="#111";ctx.lineWidth=1.5;ctx.stroke();
    angle+=slice;
  });

  const leg=document.getElementById("legendCat");
  if(leg)leg.innerHTML=entries.map(([k,v],i)=>`<span><span class="legend-swatch" style="background:${PALETTE[i%PALETTE.length]}"></span>${k}: ${formatMoney(v)}</span>`).join("");
}

/* ============================================================
   DELETE
   ============================================================ */
function deleteEntry(category,index){
  if(!confirm("Delete this entry?"))return;
  vault.accounts[category].splice(index,1);
  vault.metadata.lastModifiedAt=new Date().toISOString();
  updateSummary();renderCurrentTab();setStatus("Entry deleted.");resetAutoLockTimer();
}
function deleteSnapshot(index){
  if(!confirm("Delete this snapshot?"))return;
  vault.snapshots.splice(index,1);
  vault.metadata.lastModifiedAt=new Date().toISOString();
  renderCurrentTab();setStatus("Snapshot deleted.");resetAutoLockTimer();
}

/* ============================================================
   DUPLICATE ENTRY  (FR-12)
   ============================================================ */
function duplicateEntry(category,index){
  if(!vault)return;
  resetAutoLockTimer();
  const clone=JSON.parse(JSON.stringify(vault.accounts[category][index]));
  currentEdit={category,index:null};
  document.getElementById("modalTitle").textContent="Duplicate "+CATEGORY_LABELS[category].replace(/s$/,"");
  document.getElementById("entryForm").innerHTML=buildForm(SCHEMAS[category],clone);
  showModal("modalBackdrop");
}

/* ============================================================
   ADD / EDIT MODAL
   ============================================================ */
function buildForm(schema,data){
  return schema.map(f=>{
    const val=escapeHtml(data?(data[f.key]??""):"");
    const inp=f.type==="textarea"
      ?`<textarea id="field_${f.key}" rows="3">${val}</textarea>`
      :f.type==="number"
        ?`<input type="number" step="any" id="field_${f.key}" value="${val}">`
        :`<input type="text" id="field_${f.key}" value="${val}">`;
    return`<label>${escapeHtml(f.label)}</label>${inp}`;
  }).join("");
}

function openAddModal(category){
  if(!vault)return;
  resetAutoLockTimer();
  currentEdit={category,index:null};
  document.getElementById("modalTitle").textContent="Add "+CATEGORY_LABELS[category].replace(/s$/,"");
  document.getElementById("entryForm").innerHTML=buildForm(SCHEMAS[category],null);
  showModal("modalBackdrop");
}

function openEditModal(category,index){
  if(!vault)return;
  resetAutoLockTimer();
  currentEdit={category,index};
  document.getElementById("modalTitle").textContent="Edit "+CATEGORY_LABELS[category].replace(/s$/,"");
  document.getElementById("entryForm").innerHTML=buildForm(SCHEMAS[category],vault.accounts[category][index]);
  showModal("modalBackdrop");
}

document.getElementById("btnCancelModal").onclick=()=>hideModal("modalBackdrop");
document.getElementById("btnSaveModal").onclick=()=>{
  const{category,index}=currentEdit;
  if(!category||!vault)return;
  const entry={};
  SCHEMAS[category].forEach(f=>{const el=document.getElementById("field_"+f.key);entry[f.key]=el?el.value:"";});
  if(index===null)vault.accounts[category].push(entry);
  else vault.accounts[category][index]=entry;
  vault.metadata.lastModifiedAt=new Date().toISOString();
  updateSummary();renderCurrentTab();setStatus("Entry saved.");
  hideModal("modalBackdrop");resetAutoLockTimer();
};

/* ============================================================
   ACTIVITY TRACKING
   ============================================================ */
["click","keydown","mousemove"].forEach(evt=>
  document.addEventListener(evt,()=>{if(vault)resetAutoLockTimer();},{passive:true})
);

/* ============================================================
   INIT
   ============================================================ */
updateSummary();
renderCurrentTab();
</script>
